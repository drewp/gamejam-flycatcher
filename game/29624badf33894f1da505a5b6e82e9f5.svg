eting against my brother, Arrowira who </tspan><tspan x="0" dy="46.15px">made a game where monkeys swing eachother </tspan><tspan x="0" dy="46.15px">on a rope and try to break all of the enemies.</tspan><tspan x="0" dy="46.15px">       If you have ever played Hollow Knight, you'd </tspan><tspan x="0" dy="46.15px">probably find something in this similar to it's </tspan><tspan x="0" dy="46.15px">bosses.</tspan></text></g></g></svg>